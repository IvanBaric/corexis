name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            testbench: '^9.0'
          - php: '8.2'
            testbench: '^10.0'
          - php: '8.3'
            testbench: '^11.0'

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring
          coverage: none

      - name: Configure Laravel matrix
        run: composer require "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Test
        run: composer test

      - name: Audit dependencies
        run: composer audit
